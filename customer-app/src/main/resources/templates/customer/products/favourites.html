<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Наши товары &ndash; Магазин</title>
</head>
<body>
<a th:href="@{/customer/products/list}">Все</a>
<h1>Избранные товары</h1>
<ul>
    <li th:each="product: ${products}">
        <strong>
            <a th:text="${product.title}"
               th:href="@{/customer/products/{productId}(productId=${product.id})}"></a>
        </strong>
        <p th:text="${product.description}"></p>
    </li>
</ul>
</body>

</html>
